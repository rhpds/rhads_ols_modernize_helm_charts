{{- if .Values.apiRoute.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.apiRoute.routeName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mta.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  to:
    kind: Service
    name: {{ .Values.apiRoute.serviceName }}
    weight: 100
  port:
    targetPort: {{ .Values.apiRoute.targetPort }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
