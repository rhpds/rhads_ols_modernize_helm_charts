{{- if .Values.oauthProxy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mta-oauth-proxy-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mta.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth-proxy
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.oauthProxy.deploymentName }}
  policyTypes:
  - Ingress
  ingress:
  # Allow traffic from OpenShift ingress/router
  - from:
    - namespaceSelector:
        matchLabels:
          network.openshift.io/policy-group: ingress
    ports:
    - protocol: TCP
      port: 8443
  # Allow traffic from same namespace for internal communication
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8443
{{- end }}
